name: animal_island_ui_flutter
description: "A pure Flutter UI package that recreates the Animal Island visual language with day and night themes."
version: 0.1.0
homepage: https://github.com/aa41/animal_island_ui_flutter
repository: https://github.com/aa41/animal_island_ui_flutter

environment:
  sdk: ^3.11.1
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.4.1
  flutter_svg: ^2.2.1
  google_fonts: ^6.3.2
  path_drawing: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/animal_island/src/img/icons/
    - assets/animal_island/src/img/icons/animal/
    - assets/animal_island/src/img/icons/nes/
    - assets/animal_island/src/img/icons/westworld/
    - assets/animal_island/src/img/icons/guofeng/
    - assets/animal_island/src/img/dividers/
    - assets/animal_island/src/img/cursor/
    - assets/animal_island/src/img/footer/
    - assets/animal_island/src/img/animal/status/
    - assets/animal_island/src/img/guofeng/footer/
    - assets/animal_island/src/img/guofeng/status/
    - assets/animal_island/src/img/nes/footer/
    - assets/animal_island/src/img/nes/status/
    - assets/animal_island/src/img/westworld/footer/
